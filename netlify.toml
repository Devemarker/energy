[build]
  publish = "dist"
  command = "npm run build"

# SPA Fallback Routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Explicitly cache all CSS files for a year
[[headers]]
  for = "/**/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Explicitly cache all JS files for a year
[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache Vite's assets folder (covers images, fonts, etc. inside assets)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Do not cache HTML to ensure users always get the latest version of the app
[[headers]]
  for = "/**/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# OVERRIDE: Do not cache Service Worker files to ensure PWA updates propagate immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
