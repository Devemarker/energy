[build]
  publish = "dist"
  command = "npm run build"

# SPA Fallback Routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache immutable assets (Vite hashes these) for a year
# This drastically reduces traffic consumption for returning users
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Do not cache HTML to ensure users always get the latest version of the app
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Do not cache Service Worker files to ensure PWA updates propagate immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
